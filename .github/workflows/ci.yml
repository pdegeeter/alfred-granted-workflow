name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    # macOS runner because the workflow targets macOS/Alfred (arm64).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Build release
        run: cargo build --release

  package:
    # Smoke-test that the .alfredworkflow assembles on every PR.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install powerpack-cli
        uses: extractions/setup-crate@v1
        with:
          repo: rossmacarthur/powerpack

      - name: Build and package workflow
        run: ./scripts/build.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: alfred-granted-workflow
          path: target/workflow/alfred-granted.alfredworkflow
